<ion-header class="ion-no-border">
  <ion-toolbar class="--background: #0f172a; border-b border-slate-800">
    <ion-title class="text-white font-bold">Panel de Almacén</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" color="danger">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-slate-900 ion-padding">

  <div class="mb-8">
    <h1 class="text-2xl font-black text-white">Hola, Bodeguero</h1>
    <p class="text-slate-400 text-sm">¿Qué movimiento realizaremos hoy?</p>
  </div>

  <div class="grid grid-cols-2 gap-4 mb-8">
    <div (click)="openMovementModal('input')" class="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-3xl flex flex-col items-center gap-3 active:scale-95 transition-transform">
      <div class="bg-emerald-500 p-3 rounded-2xl shadow-lg shadow-emerald-500/40">
        <ion-icon name="arrow-down-outline" class="text-white text-2xl"></ion-icon>
      </div>
      <span class="text-emerald-400 font-bold text-sm">Entrada</span>
    </div>

    <div (click)="openMovementModal('output')" class="bg-orange-500/10 border border-orange-500/20 p-6 rounded-3xl flex flex-col items-center gap-3 active:scale-95 transition-transform">
      <div class="bg-orange-500 p-3 rounded-2xl shadow-lg shadow-orange-500/40">
        <ion-icon name="arrow-up-outline" class="text-white text-2xl"></ion-icon>
      </div>
      <span class="text-orange-400 font-bold text-sm">Salida</span>
    </div>
  </div>

  <div class="bg-slate-800/50 rounded-3xl p-6 border border-slate-700">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-white font-bold text-sm uppercase tracking-widest">Actividad Reciente</h3>
      <ion-note class="text-blue-400 text-xs">Ver todo</ion-note>
    </div>

    <div class="space-y-4">
      <div *ngFor="let m of recentMovements" class="flex items-center gap-4 p-3 bg-slate-800 rounded-2xl border border-slate-700/50">
        <div [class]="m.type === 'input' ? 'text-emerald-500' : 'text-orange-500'">
          <ion-icon [name]="m.type === 'input' ? 'add-circle' : 'remove-circle'" class="text-2xl"></ion-icon>
        </div>
        <div class="flex-1">
          <p class="text-white text-xs font-bold truncate">{{ m.book.title }}</p>
          <p class="text-slate-500 text-[10px]">{{ m.location.code }} • {{ m.quantity }} uds.</p>
        </div>
        <span class="text-slate-500 text-[10px]">{{ m.created_at | date:'shortTime' }}</span>
      </div>
    </div>
  </div>

</ion-content>
