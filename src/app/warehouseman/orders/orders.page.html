<ion-header>
  <ion-toolbar color="dark">
    <ion-title>Panel de Despacho</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding bg-slate-100">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <div *ngFor="let order of pendingOrders" class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden flex flex-col">

      <div class="bg-slate-800 p-4 flex justify-between items-center text-white">
        <div>
          <span class="text-[10px] uppercase font-black text-slate-400">Orden</span>
          <h2 class="text-xl font-black">#{{ order.id }}</h2>
        </div>
        <div class="text-right">
          <p class="text-[10px] font-bold text-blue-400">{{ order.created_at | date:'shortTime' }}</p>
        </div>
      </div>

      <div class="p-4 bg-blue-50 border-b border-blue-100">
        <div class="flex items-center gap-2 mb-1">
          <ion-icon name="location" class="text-blue-600"></ion-icon>
          <span class="text-xs font-black text-blue-800 uppercase">Destino</span>
        </div>
      </div>

      <div class="p-4 flex-1">
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Lista de Recolección</p>
        <div *ngFor="let item of order.items" class="flex items-center gap-3 mb-3 p-2 rounded-xl bg-slate-50 border border-slate-100">
          <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center font-black text-lg text-blue-600 border border-slate-200 shadow-sm">
            {{ item.quantity }}
          </div>
          <div class="flex-1">
            <p class="text-xs font-bold text-slate-800 uppercase tracking-tighter">{{ item.book.title }}</p>
            <p class="text-[9px] font-black" [ngClass]="item.buy_type === 'package' ? 'text-purple-600' : 'text-orange-600'">
              {{ item.buy_type === 'package' ? '📦 CAJA / PAQUETE' : '📖 UNIDAD SUELTA' }}
            </p>
          </div>
        </div>
      </div>

      <div class="p-4">
        <button (click)="dispatchOrder(order.id)"
                class="w-full bg-green-600 text-white py-4 rounded-2xl font-black uppercase text-[11px] shadow-lg shadow-green-200 active:scale-95 transition-all">
          Marcar como Despachado
        </button>
      </div>
    </div>

  </div>

  <div *ngIf="pendingOrders.length === 0" class="flex flex-col items-center justify-center min-h-[60vh] text-slate-400">
    <ion-icon name="cube-outline" style="font-size: 80px;"></ion-icon>
    <p class="font-bold mt-4 uppercase tracking-widest">No hay órdenes pendientes</p>
  </div>
</ion-content>
