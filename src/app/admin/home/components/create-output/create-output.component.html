<ion-header class="ion-no-border">
  <ion-toolbar class="modal-toolbar">
    <ion-title class="modal-title">
      Nueva Orden de <span class="text-orange-500">Salida</span>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()" class="close-btn">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-slate-50">
  <div class="p-6 space-y-6">

    <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
      <div class="form-group">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Motivo de Salida</label>
        <div class="input-wrapper mt-2 w-full">
          <ion-icon name="alert-circle-outline" class="input-icon text-orange-500"></ion-icon>
          <ion-select [(ngModel)]="reason" placeholder="Seleccionar motivo de la lista..."
                      interface="popover" class="w-full text-xs font-bold custom-select">
            <ion-select-option *ngFor="let r of reasons" [value]="r">{{r}}</ion-select-option>
          </ion-select>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
      <div class="form-group">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Asignar Bodeguero</label>
        <div class="input-wrapper mt-2 border-orange-200">
          <ion-icon name="person-outline" class="input-icon text-orange-500"></ion-icon>
          <ion-select [(ngModel)]="warehousemanId" placeholder="Seleccionar encargado" class="w-full text-xs font-bold">
            <ion-select-option *ngFor="let w of warehousemen" [value]="w.id">
              {{ w.name }}
            </ion-select-option>
          </ion-select>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
      <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Seleccionar Material a Retirar</label>
      <div class="input-wrapper mt-2">
        <ion-icon name="search-outline" class="input-icon text-slate-400"></ion-icon>
        <ion-input placeholder="Buscar por título..." (ionInput)="searchBook($event)" class="custom-input"></ion-input>
      </div>

      <div *ngIf="searchResults.length > 0" class="mt-4 bg-slate-50 rounded-2xl overflow-hidden border border-slate-100 animate__animated animate__fadeIn">
        <div *ngFor="let book of searchResults" (click)="addItem(book)"
             class="p-3 flex justify-between items-center hover:bg-orange-50 cursor-pointer border-b border-white last:border-0">
          <div class="flex items-center gap-3">
            <span class="bg-white px-2 py-0.5 rounded text-[8px] font-black text-orange-600 border border-slate-100">{{ book.level }}</span>
            <span class="text-[11px] font-bold text-navy uppercase">{{ book.title }}</span>
          </div>
          <ion-icon name="add-circle-outline" class="text-orange-500 text-xl"></ion-icon>
        </div>
      </div>

      <div *ngIf="selectedBook" class="mt-4 p-4 bg-orange-50 rounded-2xl border border-orange-100 animate__animated animate__slideInDown">
        <div class="flex justify-between items-start mb-3">
          <p class="text-[10px] font-black text-orange-700 uppercase">Configurar salida: {{ selectedBook.title }}</p>
          <ion-icon name="close" (click)="selectedBook = null" class="text-orange-400"></ion-icon>
        </div>

        <div class="grid grid-cols-12 gap-3 items-end">
          <div class="col-span-7">
            <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Ubicación / Pallet</label>
            <div class="input-wrapper bg-white mt-1">
              <ion-select [(ngModel)]="tempLocationId" placeholder="Seleccionar..." interface="popover" class="text-xs font-bold">
                <ion-select-option *ngFor="let loc of filteredLocations" [value]="loc.id">
                  {{ loc.code }} (Stock: {{ loc.current_stock }})
                </ion-select-option>
              </ion-select>
            </div>
          </div>
          <div class="col-span-3">
            <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Cant.</label>
            <div class="input-wrapper bg-white mt-1">
              <ion-input type="number" [(ngModel)]="tempQty" class="text-center font-black text-xs"></ion-input>
            </div>
          </div>
          <div class="col-span-2">
            <button (click)="confirmAddLocation()"
                    [disabled]="!tempLocationId || tempQty <= 0"
                    class="w-full h-[48px] submit-modal-btn !shadow-lg rounded-xl shadow-md active:scale-95 transition-all flex items-center justify-center">
              <ion-icon name="checkmark" class="text-xl"></ion-icon>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden" *ngIf="items.length > 0">
      <div class="p-4 bg-[#181848] text-white flex justify-between items-center">
        <h3 class="text-[10px] font-black uppercase tracking-widest text-white">Lista de Material a Egresar</h3>
        <span class="text-[9px] bg-white/20 px-3 py-1 rounded-full font-bold">{{ items.length }} Items</span>
      </div>

      <div class="p-4 space-y-2">
        <div *ngFor="let item of items; let i = index" class="flex items-center justify-between bg-slate-50 p-3 rounded-2xl border border-slate-100 animate__animated animate__fadeIn">
          <div class="flex-1">
            <p class="text-[10px] font-black text-navy uppercase leading-tight">{{ item.title }}</p>
            <p class="text-[9px] font-bold text-orange-600 mt-0.5">PALLET: {{ item.location_code }}</p>
          </div>

          <div class="flex items-center gap-3">
            <div class="bg-white px-3 py-1.5 rounded-xl border border-slate-200">
              <span class="text-[11px] font-black text-navy">x{{ item.quantity }}</span>
            </div>
            <button (click)="removeItem(i)" class="text-red-500 p-1">
              <ion-icon name="trash-outline" class="text-lg"></ion-icon>
            </button>
          </div>
        </div>
      </div>

      <div class="p-5 border-t border-slate-100 bg-slate-50/50">
        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Observaciones / Justificación</label>
        <ion-textarea [(ngModel)]="notes" rows="2"
                      placeholder="Escriba aquí los detalles adicionales de la salida..."
                      class="bg-white rounded-2xl border border-slate-200 p-3 text-[11px] mt-2 shadow-inner">
        </ion-textarea>
      </div>
    </div>

    <div class="flex items-center gap-4 pt-4">
      <button (click)="close()" class="flex-1 py-4 text-slate-500 font-bold uppercase text-[10px] tracking-widest">
        Cancelar
      </button>

      <button
        (click)="submitOrder()"
        [disabled]="items.length === 0 || !reason || isSubmitting"
        class="submit-modal-btn group flex-[2] !shadow-lg btn-approve disabled:opacity-50">
        <span *ngIf="!isSubmitting">Autorizar Salida</span>
        <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
      </button>
    </div>

  </div>
</ion-content>
