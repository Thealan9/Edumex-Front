<ion-header class="ion-no-border">
  <ion-toolbar class="modal-toolbar">
    <ion-title class="modal-title">
      {{ isEdit ? 'Editar' : 'Nuevo' }} <span>Usuario</span>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()" class="close-btn">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">
  <div class="p-6 md:p-8">
    <form [formGroup]="form" class="space-y-6">

      <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm space-y-5">
        <h3 class="text-slate-800 font-black text-[10px] uppercase tracking-widest ml-1 flex items-center gap-2">
          <ion-icon name="person-circle-outline" class="text-blue-600 text-base"></ion-icon>
          Identificación y Acceso
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="form-group">
            <label class="form-label">Nombre(s)</label>
            <div class="input-wrapper">
              <ion-input type="text" formControlName="name" placeholder="Ej: Juan" class="custom-input"></ion-input>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Apellido(s)</label>
            <div class="input-wrapper">
              <ion-input type="text" formControlName="last_name" placeholder="Ej: Pérez" class="custom-input"></ion-input>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <div class="input-wrapper">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <ion-input type="email" formControlName="email" placeholder="correo@ejemplo.com" class="custom-input"></ion-input>
          </div>
        </div>

        <div class="form-group" *ngIf="!isEdit || (isEdit && form.get('password')?.value)">
          <label class="form-label">Contraseña {{ isEdit ? '(Para cambiar)' : '' }}</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <ion-input type="password" formControlName="password" class="custom-input"></ion-input>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm space-y-5">
        <h3 class="text-slate-800 font-black text-[10px] uppercase tracking-widest ml-1 flex items-center gap-2">
          <ion-icon name="shield-checkmark-outline" class="text-blue-600 text-base"></ion-icon>
          Rol y Tipo de Cliente
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="form-group">
            <label class="form-label">Rol en el Sistema</label>
            <div class="input-wrapper">
              <ion-select formControlName="role" interface="popover" class="custom-select">
                <ion-select-option value="admin">Administrador</ion-select-option>
                <ion-select-option value="warehouseman">Bodeguero</ion-select-option>
                <ion-select-option value="user">Cliente Final</ion-select-option>
              </ion-select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Tipo de Cliente</label>
            <div class="input-wrapper">
              <ion-select formControlName="customer_type" interface="popover" class="custom-select">
                <ion-select-option value="individual">Persona Natural</ion-select-option>
                <ion-select-option value="institutional">Institución / Colegio</ion-select-option>
              </ion-select>
            </div>
          </div>
        </div>

        <div class="form-group" *ngIf="form.get('customer_type')?.value === 'institutional'">
          <label class="form-label">Identificación Fiscal (RUC/DNI/NIT)</label>
          <div class="input-wrapper bg-blue-50/30">
            <ion-icon name="card-outline" class="input-icon"></ion-icon>
            <ion-input type="text" formControlName="tax_id" placeholder="ID de la institución" class="custom-input"></ion-input>
          </div>
        </div>
      </div>

      <button class="submit-modal-btn group" (click)="submit()" [disabled]="form.invalid || isSubmitting">
        <span>{{ isEdit ? 'Actualizar Usuario' : 'Crear Usuario' }}</span>
        <ion-icon *ngIf="!isSubmitting" name="person-add-outline" class="group-hover:scale-110 transition-transform"></ion-icon>
        <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
      </button>

    </form>
  </div>
</ion-content>
