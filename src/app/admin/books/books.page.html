<ion-header class="ion-no-border">
  <ion-toolbar class="admin-toolbar">
    <div class="page-header-container">
      <div class="header-info">
        <h1>Cartelera de <span>Libros</span></h1>
        <p class="text-slate-500 text-sm mt-1">Administración del catálogo editorial y control de existencias</p>
      </div>

      <button (click)="openCreateEdit()" class="add-book-btn">
        <ion-icon name="book-outline"></ion-icon>
        <span>Nuevo Libro</span>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-slate-50">
  <div class="p-6">

    <div class="max-w-2xl mx-auto mb-10">
      <div class="input-wrapper shadow-sm border-slate-200">
        <ion-icon name="search-outline" class="input-icon"></ion-icon>
        <ion-input
          placeholder="Buscar por ISBN, Título o Autor..."
          (ionInput)="onSearch($event)"
          [debounce]="500"
          class="custom-input">
        </ion-input>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">

      <div *ngFor="let book of books"
           class="group bg-white rounded-[2.5rem] p-4 border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 flex flex-col">

        <div class="relative aspect-[3/4] rounded-[2rem] overflow-hidden bg-slate-100 shadow-inner">
          <img [src]="book.image_url || 'assets/no-book.png'"
               class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">

          <div class="absolute inset-0 bg-navy/60 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col items-center justify-center gap-3">
            <button (click)="triggerFileInput(book.id!)"
                    class="bg-white text-navy px-4 py-2 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-90 transition-all">
              <ion-icon name="camera-outline" class="mr-1"></ion-icon> Portada
            </button>
            <input type="file" [id]="'file-input-' + book.id" (change)="onFileSelected($event, book.id!)" accept="image/*" class="hidden">
          </div>

          <div class="absolute top-4 left-4 bg-white/95 backdrop-blur-md text-navy px-3 py-1 rounded-xl text-[10px] font-black shadow-sm border border-slate-100">
            {{ book.level }}
          </div>

          <div class="absolute bottom-4 right-4 bg-gold text-navy px-2 py-1 rounded-lg text-[8px] font-black uppercase tracking-tighter shadow-lg">
            {{ book.category }}
          </div>
        </div>

        <div class="mt-5 px-1 flex-1 flex flex-col">
          <h3 class="text-[13px] font-black text-navy leading-tight uppercase line-clamp-2 min-h-[32px]">{{ book.title }}</h3>
          <p class="text-[9px] text-gray font-bold tracking-widest mt-1 mb-3 italic">{{ book.autor }}</p>

          <div class="flex justify-between items-center mt-auto pt-4 border-t border-slate-50">
            <div>
              <p class="text-[8px] font-black text-gray uppercase tracking-widest">Inversión</p>
              <p class="text-sm font-black text-navy">${{ book.price_unit }}</p>
            </div>
            <div class="text-right">
              <p class="text-[8px] font-black text-gray uppercase tracking-widest">Existencia</p>
              <div class="flex items-center justify-end gap-1">
                <div [class]="book.total_stock! <= book.stock_alert! ? 'bg-red-500' : 'bg-emerald-500'"
                     class="w-1.5 h-1.5 rounded-full animate-pulse"></div>
                <p class="text-[11px] font-black" [class.text-red-600]="book.total_stock! <= book.stock_alert!">
                  {{ book.total_stock }}
                </p>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-4 flex gap-2 items-center pt-2">
          <button (click)="openCreateEdit(book)"
                  class="flex-1 bg-light hover:bg-navy hover:text-white text-navy p-2.5 rounded-2xl transition-all duration-300">
            <ion-icon name="settings-outline" class="text-lg"></ion-icon>
          </button>

          <div class="bg-light px-3 py-1.5 rounded-2xl flex items-center gap-2">
            <span class="text-[8px] font-black text-navy uppercase">{{ book.active ? 'Activo' : 'Off' }}</span>
            <ion-toggle [checked]="book.active" (ionChange)="toggleStatus(book)" color="success" class="scale-75"></ion-toggle>
          </div>
        </div>

      </div>
    </div>
  </div>

  <ion-refresher slot="fixed" (ionRefresh)="loadBooks($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
</ion-content>
