<ion-header class="ion-no-border">
  <ion-toolbar class="--background: transparent; px-4">
    <ion-title class="text-slate-800 font-bold text-2xl uppercase tracking-tighter italic">Cartelera de Libros</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="solid" color="primary" class="rounded-2xl font-bold shadow-lg" (click)="openCreateEdit()">
        <ion-icon slot="start" name="add-outline"></ion-icon>
        Nuevo Libro
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding bg-slate-50">
  <div class="mb-8 max-w-xl mx-auto">
    <ion-searchbar
      placeholder="Buscar por ISBN o Título..."
      (ionInput)="onSearch($event)"
      class="custom-search"
      debounce="500">
    </ion-searchbar>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">

    <div *ngFor="let book of books" class="group relative bg-white rounded-[2rem] p-3 shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100 flex flex-col">

      <div class="relative aspect-[3/4] rounded-[1.5rem] overflow-hidden bg-slate-200 shadow-inner group-hover:scale-[1.02] transition-transform duration-300">

        <img [src]="book.image_url || 'assets/no-book.png'"
             class="w-full h-full object-cover grayscale-[0.3] group-hover:grayscale-0 transition-all">

        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-3">
          <button (click)="triggerFileInput(book.id!)"
                  class="bg-white text-blue-600 px-4 py-2 rounded-full font-black text-[10px] uppercase shadow-xl active:scale-90 transition-all">
            Cambiar Portada
          </button>
          <input type="file" [id]="'file-input-' + book.id" (change)="onFileSelected($event, book.id!)" accept="image/*" class="hidden">
        </div>

        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-md text-slate-900 px-3 py-1 rounded-xl text-[10px] font-black shadow-sm">
          {{ book.level }}
        </div>
      </div>

      <div class="mt-4 px-2 flex-1 flex flex-col">
        <h3 class="text-sm font-black text-slate-900 leading-tight uppercase truncate">{{ book.title }}</h3>
        <p class="text-[10px] text-slate-400 font-bold mb-2">{{ book.isbn }}</p>

        <div class="flex justify-between items-center mt-auto pt-3 border-t border-slate-50">
          <div>
            <p class="text-[9px] font-bold text-slate-400 uppercase">Precio Unit.</p>
            <p class="text-sm font-black text-blue-600">${{ book.price_unit }}</p>
          </div>
          <div class="text-right">
            <p class="text-[9px] font-bold text-slate-400 uppercase">Stock</p>
            <p class="text-xs font-bold" [class.text-red-500]="book.total_stock! <= book.stock_alert!">
              {{ book.total_stock }}
            </p>
          </div>
        </div>
      </div>

      <div class="mt-3 flex gap-2 items-center">
        <button (click)="openCreateEdit(book)"
                class="flex-1 bg-slate-100 hover:bg-blue-100 text-slate-600 hover:text-blue-600 p-2 rounded-xl transition-colors">
          <ion-icon name="create-outline" class="text-lg"></ion-icon>
        </button>
        <div class="bg-slate-50 px-2 py-1 rounded-xl flex items-center">
          <ion-toggle [checked]="book.active" (ionChange)="toggleStatus(book)" color="success" class="scale-75"></ion-toggle>
        </div>
      </div>

    </div>
  </div>

  <ion-refresher slot="fixed" (ionRefresh)="loadBooks($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
</ion-content>
