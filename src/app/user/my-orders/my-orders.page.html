<ion-content class="bg-slate-50">
  <div class="p-4">
    <div *ngFor="let order of orders" class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 mb-4">
      <div class="flex justify-between items-start mb-4">
        <div>
          <h2 class="text-sm font-black text-slate-800">Orden #{{ order.id }}</h2>
          <p class="text-[10px] text-slate-400">{{ order.created_at | date:'mediumDate' }}</p>
        </div>
        <span class="bg-blue-100 text-blue-600 text-[9px] px-3 py-1 rounded-full font-black uppercase">
          {{ statusLabels[order.status] }}
        </span>
      </div>

      <div class="flex items-center justify-between mb-4 px-2">
        <div class="flex flex-col items-center">
          <div class="w-5 h-5 rounded-full flex items-center justify-center text-[10px]"
               [class.bg-blue-600]="getStatusStep(order.status) >= 1" [class.bg-slate-200]="getStatusStep(order.status) < 1">
            <ion-icon name="card" class="text-white"></ion-icon>
          </div>
          <span class="text-[7px] mt-1 font-bold">Pagado</span>
        </div>
        <div class="flex-1 h-[2px] mx-1" [class.bg-blue-600]="getStatusStep(order.status) >= 2" [class.bg-slate-200]="getStatusStep(order.status) < 2"></div>
        <div class="flex flex-col items-center">
          <div class="w-5 h-5 rounded-full flex items-center justify-center text-[10px]"
               [class.bg-blue-600]="getStatusStep(order.status) >= 2" [class.bg-slate-200]="getStatusStep(order.status) < 2">
            <ion-icon name="airplane" class="text-white"></ion-icon>
          </div>
          <span class="text-[7px] mt-1 font-bold">Enviado</span>
        </div>
      </div>

      <div *ngIf="order.tracking_number" class="bg-slate-50 border border-slate-200 p-3 rounded-2xl mb-3">
        <p class="text-[9px] font-bold text-slate-400 uppercase">{{ order.tracking_company }}</p>
        <p class="text-xs font-black tracking-widest text-blue-700">{{ order.tracking_number }}</p>
      </div>

      <div class="border-t border-slate-100 pt-3">
        <p class="text-[11px] font-black text-slate-800 uppercase italic">Total: ${{ order.total }}</p>
      </div>
    </div>
  </div>
</ion-content>
